<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradeSnap — Filled Sheet Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #f0f0f0; }

  @media print {
    .no-print { display: none !important; }
    body { background: #fff; margin: 0; padding: 0; }
    .preview { padding: 0 !important; }
    canvas { box-shadow: none !important; }
    @page { margin: 0.4in; }
  }

  .app { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }

  .sidebar {
    background: #1a1a2e; color: #ccc; padding: 24px 20px;
    overflow-y: auto; border-right: 1px solid #333;
  }
  .sidebar h1 { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 2px; }
  .sidebar .tagline { font-size: 11px; color: #666; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 4px;
  }
  .form-group input[type="text"],
  .form-group input[type="number"],
  .form-group input[type="date"] {
    width: 100%; padding: 7px 10px; background: #16213e;
    border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 13px; outline: none;
  }
  .form-group input:focus { border-color: #4a6cf7; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .radio-group { display: flex; gap: 12px; }
  .radio-group label {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: #ccc; text-transform: none; letter-spacing: 0; cursor: pointer;
  }

  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 6px;
  }
  .btn-primary { background: #4a6cf7; color: #fff; }
  .btn-primary:hover { background: #3a5ce5; }
  .btn-secondary { background: #2a2a3e; color: #aaa; border: 1px solid #444; }
  .btn-secondary:hover { background: #333; }
  .btn-accent { background: #e85d04; color: #fff; }
  .btn-accent:hover { background: #d45200; }

  .sep { border: none; border-top: 1px solid #333; margin: 18px 0; }

  .preview {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 32px; background: #e8e8e8; gap: 16px;
  }
  canvas { background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.18); }

  .answer-key {
    background: #fff; border-radius: 8px; padding: 16px; max-width: 960px; width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 12px; line-height: 1.7; color: #444;
  }
  .answer-key h3 { font-size: 13px; color: #222; margin-bottom: 6px; }
  .answer-key .wrong { color: #e03131; font-weight: 600; }
  .answer-key .correct { color: #2b8a3e; }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .preview { padding: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar no-print">
    <h1>GradeSnap</h1>
    <p class="tagline">Filled Sheet Generator (for testing)</p>

    <div class="form-group">
      <label>Quiz / Test Title</label>
      <input type="text" id="quizTitle" value="Algebraic Expressions Quiz" placeholder="Quiz title">
    </div>
    <div class="row2">
      <div class="form-group">
        <label>Subject</label>
        <input type="text" id="subject" value="Mathematics 7" placeholder="Subject">
      </div>
      <div class="form-group">
        <label>Quarter / Term</label>
        <input type="text" id="quarter" value="Q3" placeholder="Q3">
      </div>
    </div>
    <div class="form-group">
      <label>Grade · Section</label>
      <input type="text" id="gradeSection" value="Gr.7 – Einstein" placeholder="Grade 7 – Section A">
    </div>
    <div class="form-group">
      <label>Teacher</label>
      <input type="text" id="teacher" value="Ms. Garcia" placeholder="Teacher name">
    </div>

    <hr class="sep">

    <div class="row2">
      <div class="form-group">
        <label>Questions (5–100)</label>
        <input type="number" id="questionCount" value="50" min="5" max="100">
      </div>
      <div class="form-group">
        <label>Points</label>
        <input type="number" id="totalPoints" value="50" min="1" max="999">
      </div>
    </div>
    <div class="form-group">
      <label>Choices per Question</label>
      <div class="radio-group">
        <label><input type="radio" name="choiceCount" value="4" checked> 4 (A-D)</label>
        <label><input type="radio" name="choiceCount" value="5"> 5 (A-E)</label>
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="sheetDate" value="">
    </div>

    <hr class="sep">

    <div class="form-group">
      <label>Student Name</label>
      <input type="text" id="studentName" value="Juan Dela Cruz" placeholder="Student name">
    </div>
    <div class="form-group">
      <label>Student ID (barcode)</label>
      <input type="text" id="studentNumber" value="201510833132" placeholder="e.g. 201510833132">
    </div>

    <hr class="sep">

    <div class="form-group">
      <label>Number of Wrong Answers</label>
      <input type="number" id="wrongCount" value="2" min="0" max="100">
    </div>

    <button class="btn btn-primary" onclick="generate()">Generate Filled Sheet</button>
    <button class="btn btn-accent" onclick="randomize()">Randomize Answers</button>
    <button class="btn btn-secondary" onclick="window.print()">Print Sheet</button>
  </aside>

  <main class="preview">
    <canvas id="sheet"></canvas>
    <div id="answerKey" class="answer-key no-print"></div>
  </main>
</div>

<script>
// ── Constants (MUST match lib/grid-layout.ts) ────────────────────────────────
const SHEET_W = 320, SHEET_H = 450;
const WARP_W = 800, WARP_H = 1125;
const AREA_X0 = 0.10, AREA_X1 = 0.90;
const AREA_Y0 = 0.33, AREA_Y1 = 0.82;
const COL_GAP_NORM = 0.02;
const LABEL_WIDTH_NORM = 0.04;

function computeGridLayout(questionCount, choiceCount) {
  choiceCount = choiceCount || 4;
  let questionColumns;
  if (questionCount <= 10) questionColumns = 1;
  else if (questionCount <= 25) questionColumns = 2;
  else if (questionCount <= 50) questionColumns = 3;
  else if (questionCount <= 75) questionColumns = 4;
  else questionColumns = 5;

  const questionsPerColumn = Math.ceil(questionCount / questionColumns);
  const letters = choiceCount === 5 ? ['A','B','C','D','E'] : ['A','B','C','D'];
  const areaW = AREA_X1 - AREA_X0, areaH = AREA_Y1 - AREA_Y0;
  const colWidth = (areaW - COL_GAP_NORM * (questionColumns - 1)) / questionColumns;
  const bubbleSpacingH = (colWidth - LABEL_WIDTH_NORM) / choiceCount;
  const bubbleSpacingV = areaH / questionsPerColumn;
  const MIN_BUBBLE_NORM = 10 / WARP_W;
  const bubbleDiameterNorm = Math.max(MIN_BUBBLE_NORM, Math.min(bubbleSpacingH, bubbleSpacingV) * 0.72);

  function bubbleCenter(q, c) {
    const qCol = Math.floor(q / questionsPerColumn);
    const qRow = q % questionsPerColumn;
    const colStartX = AREA_X0 + qCol * (colWidth + COL_GAP_NORM);
    return {
      nx: colStartX + LABEL_WIDTH_NORM + (c + 0.5) * bubbleSpacingH,
      ny: AREA_Y0 + (qRow + 0.5) * bubbleSpacingV,
    };
  }
  function labelX(q) {
    const qCol = Math.floor(q / questionsPerColumn);
    return AREA_X0 + qCol * (colWidth + COL_GAP_NORM) + LABEL_WIDTH_NORM * 0.5;
  }

  return {
    questionCount, choiceCount, letters, questionColumns, questionsPerColumn,
    bubbleDiameterNorm, bubbleDiameterSheet: bubbleDiameterNorm * SHEET_W,
    colWidth, bubbleSpacingH, bubbleSpacingV, bubbleCenter, labelX,
  };
}

const MARK_SIZE = 20;
const MARKS = [
  { x: 9.6, y: 18 },
  { x: SHEET_W - 9.6 - MARK_SIZE, y: 18 },
  { x: 9.6, y: SHEET_H - 18 - MARK_SIZE },
  { x: SHEET_W - 9.6 - MARK_SIZE, y: SHEET_H - 18 - MARK_SIZE },
];

// ── Code 128B barcode encoder (MUST match lib/barcode.ts) ───────────────────
const BARCODE_X0 = 0.20, BARCODE_X1 = 0.80;
const BARCODE_Y0 = 0.88, BARCODE_Y1 = 0.91;
const BARCODE_LABEL_Y = 0.875;

const CODE128_BINARY = [
  "11011001100","11001101100","11001100110","10010011000","10010001100",
  "10001001100","10011001000","10011000100","10001100100","11001001000",
  "11001000100","11000100100","10110011100","10011011100","10011001110",
  "10111001100","10011101100","10011100110","11001110010","11001011100",
  "11001001110","11011100100","11001110100","11101101110","11101001100",
  "11100101100","11100100110","11101100100","11100110100","11100110010",
  "11011011000","11011000110","11000110110","10100011000","10001011000",
  "10001000110","10110001000","10001101000","10001100010","11010001000",
  "11000101000","11000100010","10110111000","10110001110","10001101110",
  "10111011000","10111000110","10001110110","11101110110","11010001110",
  "11000101110","11011101000","11011100010","11011101110","11101011000",
  "11101000110","11100010110","11101101000","11101100010","11100011010",
  "11101111010","11001000010","11110001010","10100110000","10100001100",
  "10010110000","10010000110","10000101100","10000100110","10110010000",
  "10110000100","10011010000","10011000010","10000110100","10000110010",
  "11000010010","11001010000","11110111010","11000010100","10001111010",
  "10100111100","10010111100","10010011110","10111100100","10011110100",
  "10011110010","11110100100","11110010100","11110010010","11011011110",
  "11011110110","11110110110","10101111000","10100011110","10001011110",
  "10111101000","10111100010","11110101000","11110100010","10111011110",
  "10111101110","11101011110","11110101110","11010000100","11010010000",
  "11010011100",
];
const CODE128_STOP_BINARY = "1100011101011";

function binaryToWidths(bin) {
  const w = []; let i = 0;
  while (i < bin.length) {
    const ch = bin[i]; let run = 0;
    while (i < bin.length && bin[i] === ch) { run++; i++; }
    w.push(run);
  }
  return w;
}

const CODE128_PATTERNS = CODE128_BINARY.map(binaryToWidths);
const CODE128_STOP = binaryToWidths(CODE128_STOP_BINARY);

function encodeCode128B(text) {
  const START_B = 104;
  let checksum = START_B;
  const symbols = [CODE128_PATTERNS[START_B]];
  for (let i = 0; i < text.length; i++) {
    const val = text.charCodeAt(i) - 32;
    if (val < 0 || val > 94) continue;
    symbols.push(CODE128_PATTERNS[val]);
    checksum += (i + 1) * val;
  }
  symbols.push(CODE128_PATTERNS[checksum % 103]);
  symbols.push(CODE128_STOP);
  return symbols.flat();
}

function formatDate(dateStr) {
  if (!dateStr) return new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Random answer generation ────────────────────────────────────────────────
let lastAnswerData = null;

function generateAnswers(questionCount, choiceCount, wrongCount) {
  const letters = choiceCount === 5 ? ['A','B','C','D','E'] : ['A','B','C','D'];
  const correct = [];
  for (let i = 0; i < questionCount; i++) {
    correct.push(letters[Math.floor(Math.random() * choiceCount)]);
  }

  const student = [...correct];
  const clampedWrong = Math.min(wrongCount, questionCount);

  // Pick random unique positions for wrong answers
  const indices = Array.from({ length: questionCount }, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  const wrongIndices = indices.slice(0, clampedWrong).sort((a, b) => a - b);

  for (const wi of wrongIndices) {
    let wrong;
    do { wrong = letters[Math.floor(Math.random() * choiceCount)]; } while (wrong === correct[wi]);
    student[wi] = wrong;
  }

  return { correct, student, wrongIndices };
}

// ── Draw sheet ──────────────────────────────────────────────────────────────
function drawSheet(canvas, opts) {
  const S = 3;
  const W = SHEET_W * S, H = SHEET_H * S;
  canvas.width = W; canvas.height = H;
  canvas.style.width = SHEET_W + 'px';
  canvas.style.height = SHEET_H + 'px';
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // Registration marks
  ctx.fillStyle = '#000';
  for (const m of MARKS) ctx.fillRect(m.x * S, m.y * S, MARK_SIZE * S, MARK_SIZE * S);
  // Midpoint marks — 10×10 squares (smaller than corners to avoid false detection)
  const MID_SIZE = 10;
  const midOff = (MARK_SIZE - MID_SIZE) / 2;
  const midY = (SHEET_H - MID_SIZE) / 2;
  ctx.fillRect((9.6 + midOff) * S, midY * S, MID_SIZE * S, MID_SIZE * S);
  ctx.fillRect((SHEET_W - 9.6 - MARK_SIZE + midOff) * S, midY * S, MID_SIZE * S, MID_SIZE * S);

  // Header bar
  const barY = 50, barH = 38, barX = 32, barW = SHEET_W - 64;

  ctx.fillStyle = '#999';
  ctx.font = `bold ${6 * S}px Arial`;
  ctx.textAlign = 'left';
  ctx.fillText('GRADESNAP', (barX + 8) * S, (barY + 10) * S);

  ctx.fillStyle = '#000';
  ctx.font = `bold ${14 * S}px Arial`;
  ctx.fillText('ANSWER SHEET', (barX + 8) * S, (barY + 24) * S);

  ctx.fillStyle = '#555';
  ctx.font = `${6.5 * S}px Arial`;
  ctx.fillText([opts.subject, opts.gradeSection, opts.quarter].filter(Boolean).join(' · '), (barX + 8) * S, (barY + 32) * S);

  ctx.font = `${5.5 * S}px Arial`;
  ctx.fillText([opts.quizTitle, opts.totalPoints ? opts.totalPoints + ' pts' : '', opts.dateStr].filter(Boolean).join(' · '), (barX + 8) * S, (barY + 37) * S);

  // Student info table
  const tableY = 98, tableH = 28, tableX = barX, tableW = barW;
  const col1W = tableW * 0.52, col2W = tableW * 0.24;
  const rowH = tableH / 2;

  ctx.strokeStyle = '#999'; ctx.lineWidth = 0.5 * S;
  ctx.strokeRect(tableX * S, tableY * S, tableW * S, tableH * S);
  ctx.beginPath(); ctx.moveTo(tableX * S, (tableY + rowH) * S); ctx.lineTo((tableX + tableW) * S, (tableY + rowH) * S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo((tableX + col1W) * S, tableY * S); ctx.lineTo((tableX + col1W) * S, (tableY + tableH) * S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo((tableX + col1W + col2W) * S, tableY * S); ctx.lineTo((tableX + col1W + col2W) * S, (tableY + tableH) * S); ctx.stroke();

  const lp = 3;
  ctx.fillStyle = '#000'; ctx.font = `bold ${4.5 * S}px Arial`;
  ctx.fillText('NAME', (tableX + lp) * S, (tableY + 5) * S);
  ctx.fillText('NO.', (tableX + col1W + lp) * S, (tableY + 5) * S);
  ctx.fillText('DATE', (tableX + col1W + col2W + lp) * S, (tableY + 5) * S);
  ctx.fillText('SECTION', (tableX + lp) * S, (tableY + rowH + 5) * S);
  ctx.fillText('SCORE', (tableX + col1W + lp) * S, (tableY + rowH + 5) * S);
  ctx.fillText('TEACHER', (tableX + col1W + col2W + lp) * S, (tableY + rowH + 5) * S);

  ctx.fillStyle = '#222'; ctx.font = `${6 * S}px Arial`;
  ctx.fillText(opts.studentName || '', (tableX + lp) * S, (tableY + 12) * S);
  ctx.fillText(opts.studentNumber || '', (tableX + col1W + lp) * S, (tableY + 12) * S);
  ctx.fillText(opts.dateStr || '', (tableX + col1W + col2W + lp) * S, (tableY + 12) * S);
  ctx.fillText(opts.section || '', (tableX + lp) * S, (tableY + rowH + 12) * S);
  ctx.fillStyle = '#555';
  ctx.fillText('_______ / ' + (opts.totalPoints || opts.questionCount), (tableX + col1W + lp) * S, (tableY + rowH + 12) * S);
  ctx.fillStyle = '#222';
  ctx.fillText(opts.teacher || '', (tableX + col1W + col2W + lp) * S, (tableY + rowH + 12) * S);

  // Divider
  const divY = 135;
  ctx.setLineDash([4 * S, 3 * S]); ctx.strokeStyle = '#999'; ctx.lineWidth = 0.8 * S;
  ctx.beginPath(); ctx.moveTo(tableX * S, divY * S); ctx.lineTo((tableX + tableW) * S, divY * S); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#999'; ctx.font = `italic ${4.5 * S}px Arial`; ctx.textAlign = 'center';
  ctx.textAlign = 'left';

  // Answer section header
  ctx.fillStyle = '#222'; ctx.font = `bold ${7 * S}px Arial`;
  ctx.fillStyle = '#888'; ctx.font = `${4.5 * S}px Arial`;

  // Bubble grid
  const layout = computeGridLayout(opts.questionCount, opts.choiceCount);
  const bubbleD = layout.bubbleDiameterSheet, bubbleR = bubbleD / 2;
  const hfs = Math.max(5, Math.min(8, bubbleD * 0.55));
  const lfs = Math.max(5, Math.min(8, bubbleD * 0.55));

  // Column separators
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.5 * S;
  for (let qCol = 1; qCol < layout.questionColumns; qCol++) {
    const sx = (AREA_X0 + qCol * (layout.colWidth + COL_GAP_NORM) - COL_GAP_NORM / 2) * SHEET_W * S;
    ctx.beginPath(); ctx.moveTo(sx, (AREA_Y0 * SHEET_H - 4) * S); ctx.lineTo(sx, (AREA_Y1 * SHEET_H + 2) * S); ctx.stroke();
  }

  // Column headers
  ctx.fillStyle = '#222'; ctx.font = `bold ${hfs * S}px Arial`; ctx.textAlign = 'center';
  for (let qCol = 0; qCol < layout.questionColumns; qCol++) {
    const q0 = qCol * layout.questionsPerColumn;
    for (let c = 0; c < layout.choiceCount; c++) {
      const { nx, ny } = layout.bubbleCenter(q0, c);
      ctx.fillText(layout.letters[c], nx * SHEET_W * S, (ny * SHEET_H - bubbleD - 1) * S);
    }
  }

  // Row labels + bubbles
  for (let q = 0; q < opts.questionCount; q++) {
    ctx.fillStyle = '#444'; ctx.font = `600 ${lfs * S}px Arial`; ctx.textAlign = 'right';
    const lx = layout.labelX(q) * SHEET_W;
    const { ny } = layout.bubbleCenter(q, 0);
    ctx.fillText(String(q + 1), (lx + 2) * S, (ny * SHEET_H + lfs * 0.35) * S);

    for (let c = 0; c < layout.choiceCount; c++) {
      const { nx, ny: by } = layout.bubbleCenter(q, c);
      const cx = nx * SHEET_W * S, cy = by * SHEET_H * S, r = bubbleR * S;
      const isFilled = opts.filledAnswers && opts.filledAnswers[q] === layout.letters[c];

      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (isFilled) { ctx.fillStyle = '#1a1a1a'; ctx.fill(); }
      else { ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2 * S; ctx.stroke(); }
    }
  }

  // ── Student ID barcode ──
  // Section divider
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 0.5 * S;
  ctx.beginPath();
  ctx.moveTo(BARCODE_X0 * SHEET_W * S, BARCODE_LABEL_Y * SHEET_H * S);
  ctx.lineTo(BARCODE_X1 * SHEET_W * S, BARCODE_LABEL_Y * SHEET_H * S);
  ctx.stroke();

  // Draw barcode if student ID provided
  const studentId = (opts.studentNumber || '').trim();
  if (studentId.length > 0) {
    const text = studentId;
    const widths = encodeCode128B(text);
    const totalUnits = widths.reduce((a, b) => a + b, 0);
    const quietZone = 10;
    const fullUnits = quietZone * 2 + totalUnits;

    const regionX = BARCODE_X0 * SHEET_W * S;
    const regionY = BARCODE_Y0 * SHEET_H * S;
    const regionW = (BARCODE_X1 - BARCODE_X0) * SHEET_W * S;
    const regionH = (BARCODE_Y1 - BARCODE_Y0) * SHEET_H * S;
    const unitPx = regionW / fullUnits;

    let x = regionX + quietZone * unitPx;
    let isBar = true;
    for (const w of widths) {
      if (isBar) {
        ctx.fillStyle = '#000';
        ctx.fillRect(x, regionY, w * unitPx, regionH);
      }
      x += w * unitPx;
      isBar = !isBar;
    }

    // Human-readable number below barcode
    ctx.fillStyle = '#333';
    ctx.font = `${5 * S}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(text, ((BARCODE_X0 + BARCODE_X1) / 2) * SHEET_W * S, (BARCODE_Y1 * SHEET_H + 6) * S);
  } else {
    // Empty placeholder
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 0.5 * S;
    ctx.setLineDash([3 * S, 3 * S]);
    ctx.strokeRect(BARCODE_X0 * SHEET_W * S, BARCODE_Y0 * SHEET_H * S,
      (BARCODE_X1 - BARCODE_X0) * SHEET_W * S, (BARCODE_Y1 - BARCODE_Y0) * SHEET_H * S);
    ctx.setLineDash([]);
  }

  // Footer
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5 * S;
  ctx.beginPath(); ctx.moveTo(tableX * S, (SHEET_H - 22) * S); ctx.lineTo((tableX + tableW) * S, (SHEET_H - 22) * S); ctx.stroke();
  ctx.fillStyle = '#888'; ctx.font = `${4.5 * S}px Arial`; ctx.textAlign = 'center';
  ctx.fillText(['GradeSnap', opts.quarter, opts.dateStr, opts.quizTitle].filter(Boolean).join(' · '), (SHEET_W / 2) * S, (SHEET_H - 16) * S);
  ctx.font = `${4 * S}px Arial`;
  ctx.fillText(opts.questionCount + ' items · ' + (opts.totalPoints || opts.questionCount) + ' total points · Do not reproduce without permission', (SHEET_W / 2) * S, (SHEET_H - 10) * S);
  ctx.textAlign = 'left';
}

// ── Show answer key ─────────────────────────────────────────────────────────
function showAnswerKey(data, questionCount) {
  const el = document.getElementById('answerKey');
  const correctCount = questionCount - data.wrongIndices.length;
  const score = Math.round((correctCount / questionCount) * 100);

  let html = `<h3>Answer Key — Score: ${correctCount}/${questionCount} (${score}%)</h3>`;
  html += `<div style="margin-bottom:8px"><strong>Wrong answers at:</strong> `;
  if (data.wrongIndices.length === 0) {
    html += '<span class="correct">None — perfect score!</span>';
  } else {
    html += data.wrongIndices.map(i =>
      `<span class="wrong">Q${i + 1} (correct: ${data.correct[i]}, filled: ${data.student[i]})</span>`
    ).join(', ');
  }
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(55px,1fr));gap:2px 6px;font-size:11px;font-family:monospace">';
  for (let i = 0; i < questionCount; i++) {
    const isWrong = data.wrongIndices.includes(i);
    const cls = isWrong ? 'wrong' : 'correct';
    html += `<span class="${cls}">${String(i + 1).padStart(3)}: ${data.correct[i]}${isWrong ? '→' + data.student[i] : ''}</span>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── Generate ────────────────────────────────────────────────────────────────
function generate() {
  const canvas = document.getElementById('sheet');
  const questionCount = Math.min(100, Math.max(5, parseInt(document.getElementById('questionCount').value) || 10));
  const choiceCount = parseInt(document.querySelector('input[name="choiceCount"]:checked').value);
  const wrongCount = Math.min(questionCount, Math.max(0, parseInt(document.getElementById('wrongCount').value) || 0));
  const dateVal = document.getElementById('sheetDate').value;

  // Generate or reuse answers
  if (!lastAnswerData || lastAnswerData.questionCount !== questionCount ||
      lastAnswerData.choiceCount !== choiceCount || lastAnswerData.wrongCount !== wrongCount) {
    const ans = generateAnswers(questionCount, choiceCount, wrongCount);
    lastAnswerData = { ...ans, questionCount, choiceCount, wrongCount };
  }

  drawSheet(canvas, {
    quizTitle: document.getElementById('quizTitle').value,
    subject: document.getElementById('subject').value,
    gradeSection: document.getElementById('gradeSection').value,
    quarter: document.getElementById('quarter').value,
    teacher: document.getElementById('teacher').value,
    questionCount,
    choiceCount,
    totalPoints: document.getElementById('totalPoints').value,
    studentName: document.getElementById('studentName').value,
    studentNumber: document.getElementById('studentNumber').value,
    section: document.getElementById('gradeSection').value,
    dateStr: formatDate(dateVal),
    filledAnswers: lastAnswerData.student,
  });

  showAnswerKey(lastAnswerData, questionCount);
}

function randomize() {
  lastAnswerData = null;
  generate();
}

// Init
document.getElementById('sheetDate').value = new Date().toISOString().split('T')[0];
// Randomize student number on each page load (20108100–20108300)
document.getElementById('studentNumber').value = String(20108100 + Math.floor(Math.random() * 201));
generate();

// Auto-regenerate on input change (except randomize triggers)
document.querySelectorAll('.sidebar input').forEach(el => {
  el.addEventListener('input', () => {
    // Reset answers when question count/choice count/wrong count change
    if (['questionCount', 'wrongCount'].includes(el.id) || el.name === 'choiceCount') {
      lastAnswerData = null;
    }
    generate();
  });
  el.addEventListener('change', () => {
    if (el.name === 'choiceCount') lastAnswerData = null;
    generate();
  });
});
</script>
